<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gruppen·Checkpoint – Studjo</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --rot:    #b61f29;
      --gruen:  #15803d;
      --bg:     #f0f2f5;
      --weiss:  #ffffff;
      --text:   #0f2f37;
      --grau:   #64748b;
      --hell:   #e2e8f0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      background: white;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
      flex-shrink: 0;
    }
    header img { width: 100%; height: auto; display: block; max-height: 80px; object-fit: cover; object-position: left; }

    /* ── Wochen-Banner ── */
    .wochen-banner {
      background: var(--rot);
      color: white;
      padding: 8px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .wochen-banner h1 { font-size: 1rem; font-weight: 800; }
    .wochen-kw { font-size: 0.85rem; opacity: .85; }
    .btn-reset {
      background: rgba(255,255,255,.2);
      border: 2px solid white;
      color: white;
      border-radius: 999px;
      padding: 5px 16px;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-reset:hover { background: rgba(255,255,255,.35); }

    /* ── 3-Spalten-Layout ── */
    .checkpoint-grid {
      display: grid;
      grid-template-columns: 2fr 1.3fr 1.7fr;
      gap: 12px;
      padding: 12px;
      flex: 1;
      min-height: 0;
    }

    .spalte-titel {
      font-size: 0.65rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--rot);
      margin-bottom: 8px;
      padding-bottom: 5px;
      border-bottom: 2px solid var(--rot);
    }

    /* ════════════════════════════════════
       LINKE SPALTE – Namen & Zuständigkeiten
       ════════════════════════════════════ */
    .namen-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 7px;
    }

    .person-karte {
      background: white;
      border-radius: 12px;
      padding: 10px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
      border: 2px solid transparent;
      transition: all .2s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .person-karte:hover { border-color: var(--rot); }
    .person-karte.abwesend {
      opacity: .45;
      background: #f8fafc;
      border-color: var(--hell);
    }

    .person-kopf {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .person-foto {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
      border: 2px solid var(--hell);
      background: var(--bg);
    }

    .person-initials {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      font-weight: 900;
      color: white;
      flex-shrink: 0;
    }

    .person-name {
      font-size: 0.9rem;
      font-weight: 800;
      line-height: 1.2;
      flex: 1;
    }
    .person-karte.abwesend .person-name {
      text-decoration: line-through;
      color: var(--grau);
    }

    .abwesend-label {
      display: none;
      font-size: 0.6rem;
      font-weight: 700;
      color: var(--grau);
      text-transform: uppercase;
    }
    .person-karte.abwesend .abwesend-label { display: block; }

    /* Zuständigkeits-Badges */
    .zust-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .zust-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 0.6rem;
      font-weight: 700;
      color: white;
      white-space: nowrap;
    }
    .zust-badge.checkliste { border: 1.5px solid transparent; }
    .zust-badge.allgemein  { border: 1.5px dashed rgba(255,255,255,.6); }

    /* ════════════════════════════════════
       MITTLERE SPALTE – Info
       ════════════════════════════════════ */
    .mitte-inner {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .info-box {
      background: white;
      border-radius: 12px;
      padding: 12px 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
    }
    .info-box-titel {
      font-size: 0.65rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--grau);
      margin-bottom: 8px;
    }

    /* Gruppenleitung */
    .gl-person {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .gl-foto {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--rot);
      background: var(--bg);
    }
    .gl-initials {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      font-weight: 900;
      color: white;
      border: 3px solid var(--rot);
    }
    .gl-name { font-size: 1rem; font-weight: 800; }
    .gl-role { font-size: 0.72rem; color: var(--rot); font-weight: 700; }
    .gl-hinweis { font-size: 0.72rem; color: var(--grau); margin-top: 2px; }

    /* Termine */
    .termin-liste { display: flex; flex-direction: column; gap: 5px; }
    .termin-zeile {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      font-size: 0.78rem;
      line-height: 1.35;
    }
    .termin-tag {
      font-weight: 800;
      color: var(--rot);
      min-width: 22px;
      flex-shrink: 0;
      font-size: 0.7rem;
    }
    .termin-text { color: var(--text); }
    .termin-leer { color: var(--grau); font-style: italic; }

    /* Wichtig */
    .wichtig-box {
      background: #fff7ed;
      border: 2px solid #f97316;
      border-radius: 12px;
      padding: 12px 14px;
    }
    .wichtig-box .info-box-titel { color: #c2410c; }
    .wichtig-text { font-size: 0.82rem; font-weight: 700; color: #7c2d12; line-height: 1.5; }

    /* ════════════════════════════════════
       RECHTE SPALTE – Checkliste
       ════════════════════════════════════ */
    .checkliste-liste {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .check-item {
      background: white;
      border-radius: 12px;
      padding: 8px 10px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,.06);
      border: 2px solid transparent;
      transition: all .2s;
    }
    .check-item.erledigt {
      background: #f0fdf4;
      border-color: #86efac;
    }
    .check-item.abwesend-warnung {
      background: #fefce8;
      border-color: #fde047;
    }

    .check-foto {
      width: 44px;
      height: 44px;
      object-fit: contain;
      border-radius: 8px;
      flex-shrink: 0;
      background: var(--bg);
    }
    .check-emoji {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      flex-shrink: 0;
      background: var(--bg);
    }

    .check-info { flex: 1; min-width: 0; }
    .check-aufgabe {
      font-size: 0.78rem;
      font-weight: 800;
      line-height: 1.2;
      color: var(--text);
    }
    .check-item.erledigt .check-aufgabe { color: var(--gruen); }

    .check-person {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--grau);
      margin-top: 2px;
    }
    .check-person.keiner { color: #f97316; }
    .check-person.abwesend-warn { color: #ca8a04; }

    .check-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: 2.5px solid var(--hell);
      background: var(--bg);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      flex-shrink: 0;
      transition: all .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .check-btn:hover { border-color: var(--gruen); background: #f0fdf4; }
    .check-item.erledigt .check-btn {
      background: var(--gruen);
      border-color: var(--gruen);
      color: white;
      font-size: 1.4rem;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 10px;
      background: var(--rot);
      color: white;
      font-size: 0.78rem;
      font-weight: 600;
    }

    /* ── Responsiv ── */
    @media (max-width: 900px) {
      .checkpoint-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

<header>
  <img src="header.jpg" alt="Studjo – Arbeit und Qualifizierung"

<div class="wochen-banner">

</main>

<footer>

<script>
/* ═══════════════════════════════════════════════════════════════
   ██  KONFIGURATION  ██  – wöchentlich von der Gruppenleitung anpassen
   ═══════════════════════════════════════════════════════════════ */

const GRUPPE = {

    { personId: 2,  aufgabeId: "muell",            typ: "checkliste" },
    { personId: 3,  aufgabeId: "tische",           typ: "checkliste" },
    { personId: 4,  aufgabeId: "geschirr",         typ: "checkliste" },
    { personId: 5,  aufgabeId: "fenster",          typ: "checkliste" },
    { personId: 6,  aufgabeId: "strom",            typ: "checkliste" },
    { personId: 7,  aufgabeId: "desinfizieren",    typ: "checkliste" },
    { personId: 8,  aufgabeId: "versand",          typ: "checkliste" },
    { personId: 9,  aufgabeId: "arb_sicherheit",   typ: "checkliste" },
    { personId: 10, aufgabeId: "arb_vorbereitung", typ: "checkliste" },
    { personId: 11, aufgabeId: "essensmarken",     typ: "checkliste" },
    { personId: 12, aufgabeId: "kontrolle",        typ: "checkliste" },
    { personId: 1,  aufgabeId: "botengaenge",      typ: "allgemein"  },
    { personId: 13, aufgabeId: "botengaenge",      typ: "allgemein"  },

  ]
};

/* ── 16 Mitarbeitende ─────────────────────────────────────────
   name: Anzeigename (abgekürzter Nachname)
   foto: Dateiname des Fotos (jpg, im selben Ordner)
   farbe: Hintergrundfarbe des Initialen-Kreises (falls kein Foto)  */
const MITARBEITENDE = [
  { id: 1,  name: "Müller",    foto: "ma-01.jpg", farbe: "#1e40af" },
  { id: 2,  name: "Schmidt",   foto: "ma-02.jpg", farbe: "#15803d" },
  { id: 3,  name: "Hoffmann",  foto: "ma-03.jpg", farbe: "#b61f29" },

/* ── Aufgaben-Definitionen (fest, nicht wöchentlich ändern) ──
   foto: Metacom-Bilddatei (Marc lädt diese selbst hoch)
   emoji: Fallback-Anzeige wenn Foto fehlt                      */
const AUFGABEN = {
  fegen:           { label: "Fegen",                   foto: "check-fegen.jpg",    emoji: "🧹", farbe: "#1e40af" },
  muell:           { label: "Müll entsorgen",          foto: "check-muell.jpg",    emoji: "🗑️", farbe: "#15803d" },

/* ═══════════════════════════════════════════════════════════════
   ██  ZUSTAND  ██  – täglich automatisch zurückgesetzt (localStorage)
   ═══════════════════════════════════════════════════════════════ */

const STORAGE_KEY = 'studjo-checkpoint-v1';

function heuteDatum() {
  return new Date().toISOString().slice(0, 10); // "YYYY-MM-DD"
}

function ladeState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return null;
    return JSON.parse(raw);
  } catch { return null; }
}

function speichereState(state) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function tagesReset(manuell = false) {
  if (manuell && !confirm('Tages-Reset: Alle Einträge (Abwesenheiten + erledigte Aufgaben) zurücksetzen?')) return;
  const state = { datum: heuteDatum(), abwesend: [], erledigt: [] };
  speichereState(state);
  return state;
}

function getState() {
  let state = ladeState();
  // Auto-Reset bei neuem Tag
  if (!state || state.datum !== heuteDatum()) {
    state = tagesReset();
  }
  return state;
}

let STATE = getState();


/* ═══════════════════════════════════════════════════════════════
   ██  HILFSFUNKTIONEN  ██
   ═══════════════════════════════════════════════════════════════ */

function personById(id) {
  return MITARBEITENDE.find(p => p.id === id);
}

// Alle Zuständigkeiten einer Person
function zustaendigkeitenFuerPerson(personId) {
  return GRUPPE.zustaendigkeiten.filter(z => z.personId === personId);
}

// Zuständige Person für eine Checklisten-Aufgabe
function personFuerAufgabe(aufgabeId) {
  const z = GRUPPE.zustaendigkeiten.find(
    z => z.aufgabeId === aufgabeId && z.typ === 'checkliste'
  );
  return z ? personById(z.personId) : null;
}

function istAbwesend(personId) {
  return STATE.abwesend.includes(personId);
}

function istErledigt(aufgabeId) {
  return STATE.erledigt.includes(aufgabeId);
}

// Foto mit Fallback auf Initialen-Kreis
function fotoOderInitialen(person, groesse, cssClass) {
  const initiale = person.name.charAt(0).toUpperCase();
  return `
    <img src="${person.foto}" alt="${person.name}"
         class="${cssClass}" style="width:${groesse}px;height:${groesse}px;"
         onerror="this.outerHTML='<div class=\\"${cssClass}\\" style=\\"width:${groesse}px;height:${groesse}px;background:${person.farbe};border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:${Math.round(groesse*0.4)}px;font-weight:900;color:white;flex-shrink:0;\\">${initiale}</div>'">
  `;
}


/* ═══════════════════════════════════════════════════════════════
   ██  RENDER-FUNKTIONEN  ██
   ═══════════════════════════════════════════════════════════════ */

function renderNamen() {
  const grid = document.getElementById('namen-grid');
  grid.innerHTML = MITARBEITENDE.map(person => {
    const zust  = zustaendigkeitenFuerPerson(person.id);
    const abw   = istAbwesend(person.id);
    const badges = zust.map(z => {
      const a = AUFGABEN[z.aufgabeId];
      if (!a) return '';
      return `<span class="zust-badge ${z.typ}"
                    style="background:${a.farbe}"
                    title="${a.label}">
                ${a.emoji} ${a.label}
              </span>`;
    }).join('');

    return `
      <div class="person-karte ${abw ? 'abwesend' : ''}"
           id="person-${person.id}"
           onclick="toggleAbwesend(${person.id})"
           title="${abw ? 'Klicken: Anwesend markieren' : 'Klicken: Abwesend markieren'}">
        <div class="person-kopf">
          ${fotoOderInitialen(person, 40, 'person-foto')}
          <div>
            <div class="person-name">${person.name}</div>
            <div class="abwesend-label">abwesend</div>
          </div>
        </div>
        ${badges ? `<div class="zust-badges">${badges}</div>` : ''}
      </div>`;
  }).join('');
}

function renderMitte() {
  // Gruppenleitung
  const glPerson = document.getElementById('gl-person');
  const vId = GRUPPE.gruppenvertretung.personId;
  if (vId) {
    const p = personById(vId);
    if (p) {
      glPerson.innerHTML = `
        ${fotoOderInitialen(p, 52, 'gl-foto')}
        <div>
          <div class="gl-name">${p.name}</div>
          <div class="gl-role">Gruppenvertretung</div>
          <div class="gl-hinweis">${GRUPPE.gruppenvertretung.hinweis}</div>
        </div>`;
    }
  } else {
    glPerson.innerHTML = `<div style="color:var(--grau);font-size:.85rem;">Keine Vertretung eingetragen</div>`;
  }

  // Termine
  const terminListe = document.getElementById('termin-liste');
  terminListe.innerHTML = GRUPPE.termine.map(t => `
    <div class="termin-zeile">
      <span class="termin-tag">${t.tag}</span>
      <span class="${t.text ? 'termin-text' : 'termin-leer'}">${t.text || '–'}</span>
    </div>`).join('');

  // Diese Woche wichtig
  document.getElementById('wichtig-text').innerHTML =
    (GRUPPE.wichtig || '–').replace(/\n/g, '<br>');
}

function renderCheckliste() {
  const liste = document.getElementById('checkliste-liste');
  // Nur Checklisten-Aufgaben anzeigen (in Konfigurationsreihenfolge)
  const checkAufgaben = GRUPPE.zustaendigkeiten
    .filter(z => z.typ === 'checkliste')
    .map(z => z.aufgabeId)
    .filter((id, idx, arr) => arr.indexOf(id) === idx); // deduplizieren

  liste.innerHTML = checkAufgaben.map(aufgabeId => {
    const aufgabe  = AUFGABEN[aufgabeId];
    if (!aufgabe) return '';
    const person   = personFuerAufgabe(aufgabeId);
    const erledigt = istErledigt(aufgabeId);
    const persAbw  = person && istAbwesend(person.id);

    let personLabel, personClass;
    if (!person) {
      personLabel = '⚠️ Niemand zugewiesen';
      personClass = 'keiner';
    } else if (persAbw) {
      personLabel = `⚠️ ${person.name} (abwesend!)`;
      personClass = 'abwesend-warn';
    } else {
      personLabel = `👤 ${person.name}`;
      personClass = '';
    }

    const itemClass = erledigt ? 'erledigt' : persAbw ? 'abwesend-warnung' : '';

    return `
      <div class="check-item ${itemClass}" id="check-${aufgabeId}">
        <img src="${aufgabe.foto}" alt="${aufgabe.label}" class="check-foto"
             onerror="this.outerHTML='<div class=\\"check-emoji\\">${aufgabe.emoji}</div>'">
        <div class="check-info">
          <div class="check-aufgabe">${aufgabe.label}</div>
          <div class="check-person ${personClass}">${personLabel}</div>
        </div>
        <button class="check-btn"
                onclick="toggleErledigt('${aufgabeId}')"
                title="${erledigt ? 'Als offen markieren' : 'Als erledigt markieren'}"
                aria-label="${aufgabe.label} ${erledigt ? 'erledigt (klicken zum Rückgängig)' : 'noch offen'}">
          ${erledigt ? '✓' : ''}
        </button>
      </div>`;
  }).join('');
}

function renderAlles() {
  renderNamen();
  renderMitte();
  renderCheckliste();
}


/* ═══════════════════════════════════════════════════════════════
   ██  EVENT-HANDLER  ██
   ═══════════════════════════════════════════════════════════════ */

function toggleAbwesend(personId) {
  const idx = STATE.abwesend.indexOf(personId);
  if (idx === -1) STATE.abwesend.push(personId);
  else            STATE.abwesend.splice(idx, 1);
  speichereState(STATE);
  renderNamen();
  renderCheckliste(); // Warnung aktualisieren
}

function toggleErledigt(aufgabeId) {
  const idx = STATE.erledigt.indexOf(aufgabeId);
  if (idx === -1) STATE.erledigt.push(aufgabeId);
  else            STATE.erledigt.splice(idx, 1);
  speichereState(STATE);
  renderCheckliste();
}


/* ═══════════════════════════════════════════════════════════════
   ██  INITIALISIERUNG  ██
   ═══════════════════════════════════════════════════════════════ */

document.getElementById('gruppen-name').textContent = GRUPPE.name;
document.getElementById('wochen-kw').textContent    = GRUPPE.woche;
document.getElementById('jahr').textContent         = new Date().getFullYear();

renderAlles();
</script>
</body>
</html>
