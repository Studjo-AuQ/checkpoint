<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gruppen·Checkpoint – Studjo</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --rot:   #b61f29;
      --gruen: #16a34a;
      --bg:    #f0f2f5;
      --text:  #0f2f37;
      --grau:  #64748b;
      --hell:  #e2e8f0;
      --ROW:   80px;   /* ← Zeilenhöhe überall */
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header { background: white; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
    header img { width: 100%; max-height: 80px; object-fit: cover; object-position: left; display: block; }

    /* ── Wochen-Banner ── */
    .banner {
      background: var(--rot); color: white;
      padding: 8px 16px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
    }
    .banner h1 { font-size: 1rem; font-weight: 800; }
    .banner-kw { font-size: 0.8rem; opacity: .85; }
    .btn-reset {
      background: rgba(255,255,255,.2); border: 2px solid white; color: white;
      border-radius: 999px; padding: 5px 14px;
      font-family: inherit; font-size: 0.78rem; font-weight: 700; cursor: pointer;
    }
    .btn-reset:hover { background: rgba(255,255,255,.35); }

    /* ── 3-Spalten-Layout ── */
    .grid {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 10px;
      padding: 10px;
      align-items: start;
    }

    .spalte-titel {
      font-size: 0.62rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: .08em;
      color: var(--rot); border-bottom: 2px solid var(--rot);
      padding-bottom: 5px; margin-bottom: 6px;
    }

    /* ════════════════════════════════════════════════
       LINKE SPALTE – Namen & Zuständigkeiten
       ════════════════════════════════════════════════ */
    .namen-tabelle {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
    }

    .namen-row {
      display: flex;
      align-items: center;
      height: var(--ROW);
      border-bottom: 1px solid var(--hell);
      cursor: pointer;
      transition: background .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .namen-row:last-child { border-bottom: none; }
    .namen-row:hover { background: #fef2f2; }
    .namen-row.abwesend { background: #f8fafc; opacity: .5; }

    /* Portrait */
    .person-portrait {
      width: var(--ROW); height: var(--ROW);
      object-fit: cover; flex-shrink: 0;
      border-right: 1px solid var(--hell);
    }

    /* Name */
    .person-name {
      width: 148px; min-width: 148px;
      height: var(--ROW);
      display: flex; align-items: center;
      padding: 0 12px;
      font-size: 0.95rem; font-weight: 800;
      border-right: 1px solid var(--hell);
      overflow: hidden; white-space: nowrap;
    }
    .namen-row.abwesend .person-name {
      text-decoration: line-through;
      color: var(--grau);
    }

    /* Aufgaben-Icons */
    .aufgaben-icons {
      display: flex;
      align-items: center;
      height: var(--ROW);
    }
    .aufg-icon {
      width: var(--ROW); height: var(--ROW);
      object-fit: contain;
      flex-shrink: 0;
      border-right: 1px solid var(--hell);
      background: #fafafa;
      padding: 4px;
    }
    .aufg-icon:last-child { border-right: none; }

    /* ════════════════════════════════════════════════
       MITTLERE SPALTE – Info
       ════════════════════════════════════════════════ */
    .mitte { display: flex; flex-direction: column; gap: 10px; }

    .info-box {
      background: white; border-radius: 12px;
      padding: 12px 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
    }
    .info-titel {
      font-size: 0.6rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: .07em;
      color: var(--grau); margin-bottom: 8px;
    }

    /* Gruppenleitung */
    .gl-person { display: flex; align-items: center; gap: 10px; }
    .gl-foto {
      width: 52px; height: 52px; border-radius: 50%;
      object-fit: cover; border: 3px solid var(--rot);
      flex-shrink: 0; background: var(--bg);
    }
    .gl-name { font-size: 1rem; font-weight: 800; }
    .gl-rolle { font-size: 0.72rem; color: var(--rot); font-weight: 700; }
    .gl-hinweis { font-size: 0.7rem; color: var(--grau); margin-top: 2px; }

    /* Termine */
    .termin { display: flex; gap: 8px; font-size: 0.78rem; margin-bottom: 5px; line-height: 1.35; }
    .termin-tag { font-weight: 800; color: var(--rot); min-width: 22px; flex-shrink: 0; }
    .termin-leer { color: var(--grau); font-style: italic; }

    /* Wichtig */
    .wichtig-box {
      background: #fff7ed; border: 2px solid #f97316;
      border-radius: 12px; padding: 12px 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.07);
    }
    .wichtig-box .info-titel { color: #c2410c; }
    .wichtig-text { font-size: 0.82rem; font-weight: 700; color: #7c2d12; line-height: 1.5; }

    /* ════════════════════════════════════════════════
       RECHTE SPALTE – Tages-Checkliste
       ════════════════════════════════════════════════ */
    .check-tabelle {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 10px rgba(0,0,0,.08);
    }

    .check-row {
      display: flex;
      align-items: center;
      height: var(--ROW);
      border-bottom: 1px solid var(--hell);
    }
    .check-row:last-child { border-bottom: none; }
    .check-row.erledigt { background: #f0fdf4; }

    /* Roter X / Grüner Haken – klickbarer Toggle */
    .check-toggle {
      width: var(--ROW); height: var(--ROW);
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem; font-weight: 900;
      background: var(--rot); color: white;
      cursor: pointer;
      border: none; font-family: inherit;
      border-right: 2px solid rgba(0,0,0,.1);
      transition: background .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .check-row.erledigt .check-toggle {
      background: var(--gruen);
    }
    .check-toggle:hover { filter: brightness(1.1); }
    .check-toggle:active { filter: brightness(.9); }

    /* Aufgaben-Symbol */
    .check-symbol {
      width: var(--ROW); height: var(--ROW);
      object-fit: contain;
      flex-shrink: 0;
      border-right: 1px solid var(--hell);
      background: #fafafa;
      padding: 4px;
    }

    /* Beschriftung */
    .check-label {
      padding: 0 14px;
      font-size: 0.9rem; font-weight: 800;
      color: var(--text);
      flex: 1;
      line-height: 1.25;
    }
    .check-row.erledigt .check-label { color: var(--gruen); }

    /* ── Footer ── */
    footer {
      text-align: center; padding: 10px;
      background: var(--rot); color: white; font-size: 0.78rem; font-weight: 600;
      margin-top: auto;
    }
  </style>
</head>
<body>

<header>
  <img src="header.jpg" alt="Studjo" onerror="this.style.display='none'">
</header>

<div class="banner">
  <div>
    <div class="banner-kw" id="banner-kw"></div>
    <h1 id="banner-name">Gruppen·Checkpoint</h1>
  </div>
  <button class="btn-reset" onclick="tagesReset(true)">🔄 Neuer Tag</button>
</div>

<div class="grid">

  <!-- ══ LINKE SPALTE ══ -->
  <div>
    <div class="spalte-titel">👤 Namen &amp; Zuständigkeiten</div>
    <div class="namen-tabelle" id="namen-tabelle"><!-- JS --></div>
  </div>

  <!-- ══ MITTLERE SPALTE ══ -->
  <div>
    <div class="spalte-titel">📋 Infos &amp; Termine</div>
    <div class="mitte">

      <div class="info-box">
        <div class="info-titel">⭐ Leitung heute</div>
        <div class="gl-person" id="gl-person"><!-- JS --></div>
      </div>

      <div class="info-box">
        <div class="info-titel">📅 Termine diese Woche</div>
        <div id="termin-liste"><!-- JS --></div>
      </div>

      <div class="wichtig-box">
        <div class="info-titel">⚠️ Diese Woche wichtig</div>
        <div class="wichtig-text" id="wichtig-text"></div>
      </div>

    </div>
  </div>

  <!-- ══ RECHTE SPALTE ══ -->
  <div>
    <div class="spalte-titel">✅ Tages-Checkliste</div>
    <div class="check-tabelle" id="check-tabelle"><!-- JS --></div>
  </div>

</div>

<footer>
  &copy; <span id="jahr"></span> <b>Studjo | Arbeit und Qualifizierung</b> | Gruppen·Checkpoint
</footer>

<script>
/* ═══════════════════════════════════════════════════════════════
   KONFIGURATION – wöchentlich anpassen
   ═══════════════════════════════════════════════════════════════ */

const GRUPPE = {
  name:  "Gruppe Freisenberg",
  woche: "KW 31 | 28.07.–01.08.2025",

  gruppenvertretung: {
    personId: 3,
    hinweis: "Vertretung Mo–Mi (GL in Besprechung)"
  },

  termine: [
    { tag: "Mo", text: "Frührunde 8:15 Uhr" },
    { tag: "Di", text: "" },
    { tag: "Mi", text: "Unterweisung Arbeitssicherheit 10:30 Uhr" },
    { tag: "Do", text: "Besuch Kundenaudit" },
    { tag: "Fr", text: "Frühschluss 14:45 Uhr 🎉" }
  ],

  wichtig: "⚠️ Roter Hubwagen defekt!\nBitte NICHT benutzen – Meldung an Gruppenleitung.",

  /* ── Zuständigkeiten diese Woche ──────────────────────────────
     typ "checkliste" = max. 1 Person  |  typ "allgemein" = bis zu 2   */
  zustaendigkeiten: [
    { personId: 1,  aufgabeId: "fegen",               typ: "checkliste" },
    { personId: 2,  aufgabeId: "muell",               typ: "checkliste" },
    { personId: 3,  aufgabeId: "tische",              typ: "checkliste" },
    { personId: 4,  aufgabeId: "geschirr",            typ: "checkliste" },
    { personId: 5,  aufgabeId: "fenster",             typ: "checkliste" },
    { personId: 6,  aufgabeId: "strom",               typ: "checkliste" },
    { personId: 7,  aufgabeId: "tuerklinken",         typ: "checkliste" },
    { personId: 8,  aufgabeId: "versandvorbereitung", typ: "checkliste" },
    { personId: 9,  aufgabeId: "sicherheit",          typ: "checkliste" },
    { personId: 10, aufgabeId: "arbeitsvorbereitung", typ: "checkliste" },
    { personId: 11, aufgabeId: "checkpoint",          typ: "checkliste" },
    { personId: 1,  aufgabeId: "betriebsmittel",      typ: "allgemein"  },
    { personId: 2,  aufgabeId: "botengaenge",         typ: "allgemein"  },
    { personId: 12, aufgabeId: "botengaenge",         typ: "allgemein"  },
    { personId: 3,  aufgabeId: "hubwagen",            typ: "allgemein"  },
    { personId: 5,  aufgabeId: "qualitaet",           typ: "allgemein"  },
    { personId: 13, aufgabeId: "diensttelefon",       typ: "allgemein"  },
    { personId: 14, aufgabeId: "essensmarken",        typ: "allgemein"  },
    { personId: 7,  aufgabeId: "materialbeschaffung", typ: "allgemein"  },
    { personId: 15, aufgabeId: "mentor",              typ: "allgemein"  },
  ]
};

/* ── 16 Mitarbeitende ─────────────────────────────────────── */
const MITARBEITENDE = [
  { id: 1,  name: "Anna B."      },
  { id: 2,  name: "Thomas K."    },
  { id: 3,  name: "Maria S."     },
  { id: 4,  name: "Klaus H."     },
  { id: 5,  name: "Sandra M."    },
  { id: 6,  name: "Peter W."     },
  { id: 7,  name: "Nicole F."    },
  { id: 8,  name: "Stefan R."    },
  { id: 9,  name: "Monika L."    },
  { id: 10, name: "Michael G."   },
  { id: 11, name: "Christine D." },
  { id: 12, name: "Andreas N."   },
  { id: 13, name: "Sabine T."    },
  { id: 14, name: "Markus E."    },
  { id: 15, name: "Ursula C."    },
  { id: 16, name: "Frank J."     },
];

/* ── Aufgaben-Definitionen ────────────────────────────────── */
const AUFGABEN = {
  /* Checklisten-Aufgaben (11) */
  fegen:               { label: "Boden fegen",                foto: "check-fegen.jpg"               },
  muell:               { label: "Müll entsorgen",             foto: "check-muell.jpg"               },
  tische:              { label: "Tische wischen",             foto: "check-tische.jpg"              },
  geschirr:            { label: "Geschirr wegräumen",         foto: "check-geschirr.jpg"            },
  fenster:             { label: "Fenster schließen",          foto: "check-fenster.jpg"             },
  strom:               { label: "Strom ausschalten",          foto: "check-strom.jpg"               },
  tuerklinken:         { label: "Türklinken desinfizieren",   foto: "check-tuerklinken.jpg"         },
  versandvorbereitung: { label: "Versand vorbereiten",        foto: "check-versandvorbereitung.jpg" },
  sicherheit:          { label: "Arbeitssicherheit prüfen",   foto: "check-sicherheit.jpg"          },
  arbeitsvorbereitung: { label: "Arbeit vorbereiten",         foto: "check-arbeitsvorbereitung.jpg" },
  checkpoint:          { label: "Kontrolle Checkpoint",       foto: "check-checkpoint.jpg"          },
  /* Allgemeine Zuständigkeiten (8) */
  betriebsmittel:      { label: "Betriebsmittel prüfen",      foto: "zust-betriebsmittel.jpg"       },
  botengaenge:         { label: "Botengänge",                 foto: "zust-botengaenge.jpg"          },
  hubwagen:            { label: "Hubwagen fahren",            foto: "zust-hubwagen.jpg"             },
  qualitaet:           { label: "Qualität prüfen",            foto: "zust-qualitaet.jpg"            },
  diensttelefon:       { label: "Dienst-Telefon",             foto: "zust-diensttelefon.jpg"        },
  essensmarken:        { label: "Essensmarken zuordnen",      foto: "zust-essensmarken.jpg"         },
  materialbeschaffung: { label: "Materialbeschaffung",        foto: "zust-materialbeschaffung.jpg"  },
  mentor:              { label: "Mentor / Pate",              foto: "zust-mentor.jpg"               },
};

/* ═══════════════════════════════════════════════════════════════
   ZUSTAND – localStorage, täglich auto-reset
   ═══════════════════════════════════════════════════════════════ */
const STORAGE_KEY = 'checkpoint-v2';

function heute() { return new Date().toISOString().slice(0, 10); }

function ladeState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch { return null; }
}
function speichereState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(STATE));
}

function tagesReset(manuell = false) {
  if (manuell && !confirm('Tages-Reset: Alle Einträge zurücksetzen?')) return;
  STATE.datum    = heute();
  STATE.abwesend = [];
  STATE.erledigt = [];
  speichereState();
  renderAlles();
}

let raw = ladeState();
let STATE = (raw && raw.datum === heute())
  ? raw
  : { datum: heute(), abwesend: [], erledigt: [] };

/* ═══════════════════════════════════════════════════════════════
   RENDER – Linke Spalte
   ═══════════════════════════════════════════════════════════════ */
function renderNamen() {
  const tabelle = document.getElementById('namen-tabelle');
  tabelle.innerHTML = MITARBEITENDE.map(p => {
    const abw   = STATE.abwesend.includes(p.id);
    const zust  = GRUPPE.zustaendigkeiten.filter(z => z.personId === p.id);
    const icons = zust.map(z => {
      const a = AUFGABEN[z.aufgabeId];
      return a
        ? `<img src="${a.foto}" alt="${a.label}" title="${a.label}" class="aufg-icon">`
        : '';
    }).join('');

    return `
      <div class="namen-row ${abw ? 'abwesend' : ''}"
           onclick="toggleAbwesend(${p.id})"
           title="${abw ? 'Klicken: wieder anwesend' : 'Klicken: abwesend markieren'}">
        <img src="portrait.jpg" alt="${p.name}" class="person-portrait"
             onerror="this.style.background='#e2e8f0'">
        <div class="person-name">${p.name}</div>
        <div class="aufgaben-icons">${icons}</div>
      </div>`;
  }).join('');
}

/* ═══════════════════════════════════════════════════════════════
   RENDER – Mittlere Spalte
   ═══════════════════════════════════════════════════════════════ */
function renderMitte() {
  const vId = GRUPPE.gruppenvertretung.personId;
  const vp  = vId ? MITARBEITENDE.find(p => p.id === vId) : null;
  document.getElementById('gl-person').innerHTML = vp
    ? `<img src="portrait.jpg" alt="${vp.name}" class="gl-foto"
            onerror="this.style.background='#e2e8f0'">
       <div>
         <div class="gl-name">${vp.name}</div>
         <div class="gl-rolle">Gruppenvertretung</div>
         <div class="gl-hinweis">${GRUPPE.gruppenvertretung.hinweis}</div>
       </div>`
    : '<span style="color:var(--grau);font-size:.85rem;">Keine Vertretung</span>';

  document.getElementById('termin-liste').innerHTML = GRUPPE.termine.map(t =>
    `<div class="termin">
       <span class="termin-tag">${t.tag}</span>
       <span class="${t.text ? '' : 'termin-leer'}">${t.text || '–'}</span>
     </div>`
  ).join('');

  document.getElementById('wichtig-text').innerHTML =
    (GRUPPE.wichtig || '–').replace(/\n/g, '<br>');
}

/* ═══════════════════════════════════════════════════════════════
   RENDER – Rechte Spalte (Checkliste)
   ═══════════════════════════════════════════════════════════════ */
function renderCheckliste() {
  /* Nur Checklisten-Aufgaben, in der Reihenfolge aus AUFGABEN */
  const checkIds = Object.keys(AUFGABEN).filter(id =>
    GRUPPE.zustaendigkeiten.some(z => z.aufgabeId === id && z.typ === 'checkliste')
  );

  document.getElementById('check-tabelle').innerHTML = checkIds.map(id => {
    const a        = AUFGABEN[id];
    const erledigt = STATE.erledigt.includes(id);

    return `
      <div class="check-row ${erledigt ? 'erledigt' : ''}" id="cr-${id}">
        <button class="check-toggle"
                onclick="toggleErledigt('${id}')"
                title="${erledigt ? 'Rückgängig' : 'Als erledigt markieren'}"
                aria-label="${a.label} ${erledigt ? 'erledigt' : 'noch offen'}">
          ${erledigt ? '✓' : '✗'}
        </button>
        <img src="${a.foto}" alt="${a.label}" class="check-symbol">
        <div class="check-label">${a.label}</div>
      </div>`;
  }).join('');
}

/* ═══════════════════════════════════════════════════════════════
   EVENTS
   ═══════════════════════════════════════════════════════════════ */
function toggleAbwesend(personId) {
  const idx = STATE.abwesend.indexOf(personId);
  if (idx === -1) STATE.abwesend.push(personId);
  else            STATE.abwesend.splice(idx, 1);
  speichereState();
  renderNamen();
}

function toggleErledigt(aufgabeId) {
  const idx = STATE.erledigt.indexOf(aufgabeId);
  if (idx === -1) STATE.erledigt.push(aufgabeId);
  else            STATE.erledigt.splice(idx, 1);
  speichereState();
  renderCheckliste();
}

function renderAlles() {
  renderNamen();
  renderMitte();
  renderCheckliste();
}

/* ═══════════════════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════════════════ */
document.getElementById('banner-name').textContent = GRUPPE.name;
document.getElementById('banner-kw').textContent   = GRUPPE.woche;
document.getElementById('jahr').textContent        = new Date().getFullYear();
renderAlles();
</script>
</body>
</html>
